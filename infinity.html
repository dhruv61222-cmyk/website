<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Infinity Premium</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
</style>
</head>

<body>

<!-- ✅ FIXED CDN -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
/* Scene */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 10;

/* Renderer */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Infinity Curve */
class InfinityCurve extends THREE.Curve {
  getPoint(t) {
    const scale = 3;
    const angle = t * Math.PI * 2;

    const x = scale * Math.sin(angle);
    const y = scale * Math.sin(angle) * Math.cos(angle);
    const z = scale * Math.cos(angle) * 0.3;

    return new THREE.Vector3(x, y, z);
  }
}

/* Geometry */
const path = new InfinityCurve();
const geometry = new THREE.TubeGeometry(path, 300, 0.3, 32, true);

/* Material */
const material = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  metalness: 0.9,
  roughness: 0.2
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

/* Lights */
const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(5, 5, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0xffffff, 1);
light2.position.set(-5, -5, 5);
scene.add(light2);

scene.add(new THREE.AmbientLight(0x333333));

/* Animation */
function animate() {
  requestAnimationFrame(animate);

  mesh.rotation.y += 0.003;
  mesh.rotation.x += 0.001;

  renderer.render(scene, camera);
}

animate();

/* Resize */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
